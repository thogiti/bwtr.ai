AWSTemplateFormatVersion: '2010-09-09'
Description: Static website hosting for bwtr.ai using private S3, CloudFront OAC, and Route 53 aliases.

Parameters:
  DomainName:
    Type: String
    Default: bwtr.ai
  AlternateDomainName:
    Type: String
    Default: www.bwtr.ai
  HostedZoneId:
    Type: String
    Default: ""
    Description: Optional Route 53 hosted zone ID for bwtr.ai. Required only when CreateRoute53Records is true.
  CreateRoute53Records:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
  CertificateArn:
    Type: String
    Description: ACM certificate ARN in us-east-1 covering bwtr.ai and www.bwtr.ai.
  BucketName:
    Type: String
    Default: bwtr-ai-site-prod
    Description: Globally unique private S3 bucket name for the marketing site.

Conditions:
  ShouldCreateRoute53Records: !Equals [!Ref CreateRoute53Records, "true"]

Resources:
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  SiteOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-oac'
        Description: CloudFront access control for the bwtr.ai static site bucket.
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SecurityHeadersPolicy:
    Type: AWS::CloudFront::ResponseHeadersPolicy
    Properties:
      ResponseHeadersPolicyConfig:
        Name: !Sub '${AWS::StackName}-security-headers'
        Comment: Security headers for the bwtr.ai static site.
        SecurityHeadersConfig:
          StrictTransportSecurity:
            AccessControlMaxAgeSec: 31536000
            IncludeSubdomains: true
            Override: true
          ContentTypeOptions:
            Override: true
          FrameOptions:
            FrameOption: DENY
            Override: true
          ReferrerPolicy:
            ReferrerPolicy: strict-origin-when-cross-origin
            Override: true
          XSSProtection:
            Protection: true
            ModeBlock: true
            Override: true

  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Breakwater bwtr.ai public marketing site
        Aliases:
          - !Ref DomainName
          - !Ref AlternateDomainName
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100
        Origins:
          - Id: SiteBucketOrigin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt SiteOriginAccessControl.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: SiteBucketOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ResponseHeadersPolicyId: !Ref SecurityHeadersPolicy
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 60
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 60
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipalReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${SiteBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution}'

  ApexAliasRecord:
    Type: AWS::Route53::RecordSet
    Condition: ShouldCreateRoute53Records
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  ApexAliasRecordIpv6:
    Type: AWS::Route53::RecordSet
    Condition: ShouldCreateRoute53Records
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  WwwAliasRecord:
    Type: AWS::Route53::RecordSet
    Condition: ShouldCreateRoute53Records
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref AlternateDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  WwwAliasRecordIpv6:
    Type: AWS::Route53::RecordSet
    Condition: ShouldCreateRoute53Records
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref AlternateDomainName
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

Outputs:
  BucketName:
    Value: !Ref SiteBucket
  CloudFrontDistributionId:
    Value: !Ref SiteDistribution
  CloudFrontDomainName:
    Value: !GetAtt SiteDistribution.DomainName
